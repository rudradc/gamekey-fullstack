# Full-stack orchestration: Angular frontend + Django API + Celery worker + Redis
version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    command: uv run python manage.py runserver 0.0.0.0:8000

  worker:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    command: uv run celery -A gamekey_platform worker --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - web
